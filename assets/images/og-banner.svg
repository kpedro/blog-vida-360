<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgVida360" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d2d86;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#7f3f98;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06" />
      <stop offset="50%" style="stop-color:#f4ecf7;stop-opacity:0.14" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgVida360)" />

  <!-- Brilho suave -->
  <ellipse cx="900" cy="120" rx="280" ry="160" fill="url(#shine)" transform="rotate(-18 900 120)" />
  <circle cx="140" cy="520" r="180" fill="#ffffff" opacity="0.06" />
  <circle cx="1050" cy="480" r="220" fill="#f4ecf7" opacity="0.07" />

  <!-- Título -->
  <text x="600" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="700" fill="#ffffff" text-anchor="middle">
    Vida 360º
  </text>

  <!-- Linha de apoio (paleta clara, não azul) -->
  <text x="600" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="500" fill="#f4ecf7" text-anchor="middle">
    Bem-estar · Sono · Aromaterapia segura
  </text>

  <text x="600" y="355" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="400" fill="#eadcf1" text-anchor="middle">
    Conteúdo prático para sua rotina — com equilíbrio e propósito
  </text>

  <!-- Rodapé visual do domínio -->
  <text x="600" y="540" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff" opacity="0.92" text-anchor="middle">
    www.blogvida360.com.br
  </text>
</svg>
